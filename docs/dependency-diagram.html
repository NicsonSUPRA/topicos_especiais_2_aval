<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dependency Diagram — Travel Request Processing</title>
<style>
  @page { size: A4 landscape; margin: 1cm; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0; padding: 20px;
    background: #fff;
  }
  h1 { text-align: center; font-size: 18px; margin-bottom: 4px; color: #222; }
  h2 { text-align: center; font-size: 13px; font-weight: normal; color: #666; margin-top: 0; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<h1>Dependency Diagram — Travel Request Processing</h1>
<h2>Tópicos Especiais em Computação II — Nicson Costa Antunes</h2>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="920" height="600">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-dash" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Legend -->
  <rect x="720" y="10" width="220" height="110" rx="6" fill="#f9f9f9" stroke="#ddd"/>
  <text x="830" y="30" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Legend</text>
  <rect x="735" y="40" width="14" height="14" rx="2" fill="#4a90d9"/>
  <text x="755" y="52" font-size="10" fill="#444">Entry Point</text>
  <rect x="735" y="58" width="14" height="14" rx="2" fill="#f5a623"/>
  <text x="755" y="70" font-size="10" fill="#444">Application Layer</text>
  <rect x="735" y="76" width="14" height="14" rx="2" fill="#7ed321"/>
  <text x="755" y="88" font-size="10" fill="#444">Domain Layer</text>
  <rect x="735" y="94" width="14" height="14" rx="2" fill="#d0021b"/>
  <text x="755" y="106" font-size="10" fill="#444">Infrastructure Layer</text>

  <!-- ==================== ENTRY POINT ==================== -->
  <rect x="370" y="20" width="200" height="55" rx="8" fill="#4a90d9" filter="url(#shadow)"/>
  <text x="470" y="42" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">src/main.ts</text>
  <text x="470" y="60" text-anchor="middle" font-size="10" fill="#ddeeff">processTravelRequest()</text>

  <!-- ==================== APPLICATION LAYER ==================== -->
  <!-- UseCase -->
  <rect x="120" y="140" width="260" height="55" rx="8" fill="#f5a623" filter="url(#shadow)"/>
  <text x="250" y="162" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">ProcessTravelRequestUseCase</text>
  <text x="250" y="180" text-anchor="middle" font-size="10" fill="#fff8e0">application/usecases</text>

  <!-- UseCase Interface -->
  <rect x="420" y="140" width="200" height="55" rx="8" fill="#f5a623" filter="url(#shadow)" stroke="#fff" stroke-width="1" stroke-dasharray="4"/>
  <text x="520" y="158" text-anchor="middle" font-size="11" font-style="italic" fill="#fff">«interface»</text>
  <text x="520" y="178" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">UseCase&lt;I, O&gt;</text>

  <!-- Repository Interface -->
  <rect x="660" y="140" width="240" height="55" rx="8" fill="#f5a623" filter="url(#shadow)" stroke="#fff" stroke-width="1" stroke-dasharray="4"/>
  <text x="780" y="158" text-anchor="middle" font-size="11" font-style="italic" fill="#fff">«interface»</text>
  <text x="780" y="178" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">TravelRequestRepository</text>

  <!-- DTOs -->
  <rect x="120" y="220" width="220" height="45" rx="8" fill="#f5a623" opacity="0.75" filter="url(#shadow)"/>
  <text x="230" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">DTOs</text>
  <text x="230" y="254" text-anchor="middle" font-size="9" fill="#fff8e0">Input / Output / PersistedTravelRequest</text>

  <!-- ApplicationError -->
  <rect x="380" y="220" width="180" height="45" rx="8" fill="#f5a623" opacity="0.75" filter="url(#shadow)"/>
  <text x="470" y="246" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">ApplicationError</text>

  <!-- ==================== DOMAIN LAYER ==================== -->
  <!-- TravelRequestAnalyse -->
  <rect x="100" y="340" width="280" height="65" rx="8" fill="#7ed321" filter="url(#shadow)"/>
  <text x="240" y="365" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">TravelRequestAnalyse</text>
  <text x="240" y="382" text-anchor="middle" font-size="10" fill="#e8ffd0">domain entity — business rules</text>
  <text x="240" y="396" text-anchor="middle" font-size="9" fill="#e8ffd0">validate, calculate, determine status</text>

  <!-- TravelPeriod -->
  <rect x="430" y="340" width="220" height="65" rx="8" fill="#7ed321" filter="url(#shadow)"/>
  <text x="540" y="365" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">TravelPeriod</text>
  <text x="540" y="382" text-anchor="middle" font-size="10" fill="#e8ffd0">value object</text>
  <text x="540" y="396" text-anchor="middle" font-size="9" fill="#e8ffd0">date validation &amp; day calculation</text>

  <!-- Daily Prices -->
  <rect x="700" y="340" width="180" height="65" rx="8" fill="#7ed321" opacity="0.8" filter="url(#shadow)"/>
  <text x="790" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">DAILY_PRICES</text>
  <text x="790" y="382" text-anchor="middle" font-size="10" fill="#e8ffd0">business constants</text>
  <text x="790" y="396" text-anchor="middle" font-size="9" fill="#e8ffd0">student/employee/professor/manager</text>

  <!-- ==================== INFRASTRUCTURE LAYER ==================== -->
  <!-- PostgresRepository -->
  <rect x="100" y="480" width="300" height="55" rx="8" fill="#d0021b" filter="url(#shadow)"/>
  <text x="250" y="502" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">PostgresTravelRequestRepository</text>
  <text x="250" y="520" text-anchor="middle" font-size="10" fill="#ffd0d0">infra/database — save() / findById()</text>

  <!-- ConnectionPool -->
  <rect x="450" y="480" width="200" height="55" rx="8" fill="#d0021b" filter="url(#shadow)"/>
  <text x="550" y="502" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">ConnectionPool</text>
  <text x="550" y="520" text-anchor="middle" font-size="10" fill="#ffd0d0">getPool() / closePool()</text>

  <!-- ==================== EXTERNAL ==================== -->
  <rect x="450" y="570" width="200" height="40" rx="20" fill="#9013fe" filter="url(#shadow)"/>
  <text x="550" y="596" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">PostgreSQL DB</text>

  <!-- ==================== ARROWS ==================== -->
  <!-- main.ts → UseCase -->
  <line x1="420" y1="75" x2="300" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- main.ts → PostgresRepo (instantiates) -->
  <line x1="520" y1="75" x2="250" y2="480" stroke="#999" stroke-width="1" stroke-dasharray="5" marker-end="url(#arrow-dash)"/>

  <!-- UseCase --implements--> UseCase Interface -->
  <line x1="380" y1="167" x2="420" y2="167" stroke="#999" stroke-width="1" stroke-dasharray="4" marker-end="url(#arrow-dash)"/>

  <!-- UseCase → TravelRequestAnalyse (domain) -->
  <line x1="250" y1="195" x2="240" y2="340" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- UseCase → Repository Interface -->
  <line x1="380" y1="160" x2="660" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- UseCase → DTOs -->
  <line x1="230" y1="195" x2="230" y2="220" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- TravelRequestAnalyse → TravelPeriod -->
  <line x1="380" y1="372" x2="430" y2="372" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- TravelRequestAnalyse → DailyPrices -->
  <line x1="380" y1="385" x2="700" y2="372" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- PostgresRepo --implements--> Repository Interface -->
  <line x1="350" y1="480" x2="780" y2="195" stroke="#999" stroke-width="1.5" stroke-dasharray="5" marker-end="url(#arrow-dash)"/>

  <!-- PostgresRepo → ConnectionPool -->
  <line x1="400" y1="507" x2="450" y2="507" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ConnectionPool → PostgreSQL -->
  <line x1="550" y1="535" x2="550" y2="570" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Labels on arrows -->
  <text x="345" y="102" font-size="9" fill="#555" transform="rotate(-25,345,102)">uses</text>
  <text x="395" y="155" font-size="8" fill="#999">implements</text>
  <text x="500" y="152" font-size="9" fill="#555">depends on</text>
  <text x="190" y="298" font-size="9" fill="#555" transform="rotate(-90,190,298)">creates</text>
  <text x="405" y="365" font-size="9" fill="#555">uses</text>
  <text x="412" y="500" font-size="9" fill="#555">uses</text>
  <text x="560" y="558" font-size="9" fill="#555">connects</text>
  <text x="490" y="280" font-size="8" fill="#999" transform="rotate(-60,490,280)">implements</text>
  <text x="530" y="170" font-size="8" fill="#999" transform="rotate(-5,530,170)">instantiates</text>
</svg>

<p style="text-align: center; font-size: 11px; color: #999; margin-top: 8px;">
  Arrows show dependency direction. Dashed arrows indicate interface implementation.<br/>
  Domain layer has zero external dependencies. Infrastructure implements Application contracts.
</p>
</body>
</html>
